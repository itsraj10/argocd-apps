apiVersion: apps/v1
kind: Deployment

metadata:
  name: green-app
  namespace: deployments

spec:
  replicas: 3

  selector:
    matchLabels:
      app: green

  template:
    metadata:
      labels:
        app: green
        version: v2

    spec:
      containers:
      - name: nginx
        image: nginx:1.27

        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5