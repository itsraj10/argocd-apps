apiVersion: apps/v1
kind: Deployment

metadata:
  name: stable-app
  namespace: deployments

spec:
  replicas: 0

  selector:
    matchLabels:
      app: nginx1
      track: stable

  template:
    metadata:
      labels:
        app: nginx1
        track: stable
        version: v1

    spec:
      containers:
      - name: nginx1
        image: nginx:1.25

        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5