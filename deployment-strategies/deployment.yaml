apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-app
  namespace: deployments

spec:
  replicas: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx
        version: v3

    spec:
      containers:
      - name: nginx
        image: nginx:1.26

        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 5
          periodSeconds: 5