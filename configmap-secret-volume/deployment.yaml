apiVersion: apps/v1
kind: Deployment

metadata:
  name: hrms-app
  namespace: hrms-volume

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hrms

  template:
    metadata:
      labels:
        app: hrms

    spec:
      containers:
      - name: hrms
        image: nginx:1.27

        ports:
        - containerPort: 80

        volumeMounts:

        - name: config-volume
          mountPath: /config

        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true

      volumes:

      - name: config-volume
        configMap:
          name: hrms-config

      - name: secret-volume
        secret:
          secretName: hrms-secret