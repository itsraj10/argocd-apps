apiVersion: apps/v1
kind: Deployment

metadata:
  name: hrms-app
  namespace: hrms-env

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hrms

  template:
    metadata:
      labels:
        app: hrms

    spec:
      containers:
      - name: hrms
        image: nginx:1.27

        ports:
        - containerPort: 80

        env:

        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: APP_NAME

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: APP_ENV

        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: hrms-config
              key: DB_PORT

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: hrms-secret
              key: DB_USERNAME

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hrms-secret
              key: DB_PASSWORD

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: hrms-secret
              key: JWT_SECRET