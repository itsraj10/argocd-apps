apiVersion: apps/v1
kind: Deployment
metadata:
  name: hrms-storage
  namespace: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hrms-storage
  template:
    metadata:
      labels:
        app: hrms-storage
    spec:
      containers:
      - name: ubuntu
        image: ubuntu:22.04
        command:
        - sleep
        - infinity
        volumeMounts:
        - name: storage
          mountPath: /data
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: hrms-pvc