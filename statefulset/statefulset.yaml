apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql

spec:
  serviceName: mysql

  replicas: 3

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
        - name: mysql
          image: nginx:1.29-alpine

          ports:
            - containerPort: 80

          volumeMounts:
            - name: mysql-storage
              mountPath: /usr/share/nginx/html

  volumeClaimTemplates:
    - metadata:
        name: mysql-storage
      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 2Gi