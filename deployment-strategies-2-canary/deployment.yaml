apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-app
  namespace: canary-prod

spec:
  replicas: 5

  selector:
    matchLabels:
      app: payment

  template:
    metadata:
      labels:
        app: payment
        version: v1
        track: stable

    spec:
      containers:
      - name: nginx
        image: nginx:1.25

        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5