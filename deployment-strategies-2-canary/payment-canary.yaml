apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-canary
  namespace: canary-prod

spec:
  replicas: 3

  selector:
    matchLabels:
      app: payment
      track: canary

  template:
    metadata:
      labels:
        app: payment
        version: v2
        track: canary

    spec:
      containers:
      - name: nginx
        image: nginx:1.27

        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5