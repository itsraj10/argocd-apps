apiVersion: apps/v1
kind: Deployment

metadata:
  name: storage-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: storage-app

  template:
    metadata:
      labels:
        app: storage-app

    spec:
      containers:
      - name: busybox
        image: busybox

        command:
        - sh
        - -c
        - sleep 3600

        volumeMounts:
        - name: orders-storage
          mountPath: /data/orders

      volumes:
      - name: orders-storage
        persistentVolumeClaim:
          claimName: orders-pvc