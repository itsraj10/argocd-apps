apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook-ui
  template:
    metadata:
      labels:
        app: guestbook-ui
    spec:
      containers:
        - image: gcr.io/google-samples/gb-frontend:v5
          name: guestbook-ui

          volumeMounts:
          - name: secret-volume
            mountPath: /etc/secrets
            readOnly: true

          env:
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: username

          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password
        

          ports:
            - containerPort: 80
        volumes:
        - name: secret-volume
          secret:
            secretName: db-secret 
